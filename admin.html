<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Your Feedback</title>
    <style>
        /* Fondo negro puro igual que tu captura */
        body { 
            background-color: #000; 
            color: #d4af37; 
            font-family: 'Serif', 'Times New Roman', serif; /* Fuente elegante tipo menú */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { 
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 2rem;
            margin-bottom: 40px;
        }

        /* Estilo de círculo para el Login, igual que tus botones */
        .login-circle {
            width: 250px;
            height: 250px;
            border: 1px solid #333;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
            margin-top: 50px;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #d4af37;
            color: white;
            text-align: center;
            margin-top: 10px;
            width: 60%;
            outline: none;
        }

        /* Tarjetas de reseña con estilo circular o bordes muy suaves */
        .review-card {
            width: 90%;
            max-width: 400px;
            border: 1px solid #d4af37;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            background: #0a0a0a;
            text-align: center;
        }

        .sabor-badge {
            color: #d4af37;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .texto-review {
            color: #fff;
            font-style: italic;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <h1>ADMIN PANEL</h1>

    <div id="login-box" class="login-circle">
        <span style="font-size: 0.8rem; margin-bottom: 5px;">STAFF</span>
        <input type="password" id="pass" placeholder="••••">
        <button onclick="checkPass()" style="background:none; border:none; color:#d4af37; margin-top:15px; cursor:pointer; font-weight:bold;">ENTRAR</button>
    </div>

    <div id="admin-content" style="display:none; width: 100%; text-align: center;">
        <div id="lista-reviews"></div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('pass').value === "1234") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                cargarReviews();
            } else { alert("Error"); }
        }

        function cargarReviews() {
            fetch('/api/reviews')
                .then(res => res.json())
                .then(data => {
                    const lista = document.getElementById('lista-reviews');
                    lista.innerHTML = data.reverse().map(rev => `
                        <div class="review-card">
                            <div class="sabor-badge">${rev.sabor}</div>
                            <div class="texto-review">"${rev.texto}"</div>
                        </div>
                    `).join('');
                });
        }
    </script>
</body>
</html>
